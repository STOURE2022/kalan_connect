# KalanConnect — Docker Compose (Développement)
version: "3.9"

services:
  # ── Base de données ──
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: kalanconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Backend Django ──
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command: >
      bash -c "python manage.py migrate --noinput &&
               daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ── Celery Worker ──
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A config worker -l info

  # ── Celery Beat (tâches planifiées) ──
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Frontend Next.js ──
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
