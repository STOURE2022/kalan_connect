# KalanConnect — Docker Compose (Production)
version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-kalanconnect}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=False
      - DB_ENGINE=postgresql
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-kalanconnect.ml}
      - CORS_ALLOWED_ORIGINS=https://kalanconnect.ml,https://www.kalanconnect.ml
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-kalanconnect}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET}
      - ORANGE_MONEY_MERCHANT_KEY=${ORANGE_MONEY_MERCHANT_KEY}
      - ORANGE_MONEY_WEBHOOK_SECRET=${ORANGE_MONEY_WEBHOOK_SECRET}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - postgres
      - redis
    command: >
      bash -c "python manage.py collectstatic --noinput &&
               python manage.py migrate --noinput &&
               daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    restart: always

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=False
      - DB_ENGINE=postgresql
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-kalanconnect}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A config worker -l warning --concurrency=4
    restart: always

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - DEBUG=False
      - DB_ENGINE=postgresql
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-kalanconnect}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A config beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: always

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-kalanconnect.ml}/api/v1
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN:-kalanconnect.ml}
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew --quiet; done;'"

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_data:
  certbot_www:
